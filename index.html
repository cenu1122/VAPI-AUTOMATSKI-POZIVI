<!DOCTYPE html>
<html lang="bs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vapi-Like Realtime AI</title>
  <!-- Gleda direktno u isti folder -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>Vapi-Like AI Assistant</h1>
    
    <!-- Statusni indikator rada aplikacije -->
    <div id="status" class="status-idle">Pritisni dugme za početak...</div>

    <textarea id="message" placeholder="Ovdje će se pojavljivati ono što izgovoriš..."></textarea>

    <div class="buttons">
      <button id="startBtn" class="btn-start">🚀 Pokreni Razgovor</button>
      <button id="stopBtn" class="btn-stop" disabled>🛑 Zaustavi</button>
    </div>

    <div id="response" placeholder="AI Odgovor..."></div>
  </div>

  <!-- Gleda direktno u isti folder -->
  <script src="app.js"></script>
</body>
</html>
